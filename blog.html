<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeSmart | Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- ================= HEADER ================= -->
<div id="header"></div>

<!-- ================= HERO ================= -->
<section class="text-center py-10">
  <h1 class="text-4xl font-bold text-yellow-300">Our Blog</h1>
  <p class="text-gray-300 mt-2">Ideas, inspiration and modern design</p>
</section>

<!-- ================= IMAGE ================= -->
<section>
  <img src="image/swiss.jpg" class="w-full h-[400px] object-cover">
</section>

<!-- ================= VIDEO ================= -->
<section class="py-12 text-center px-4">

  <h2 class="text-2xl font-bold text-yellow-300 mb-6">
    Watch Our Company Video
  </h2>

  <video controls class="w-full max-w-4xl mx-auto rounded-xl shadow-lg">
    <source src="video/video.mp4" type="video/mp4">
    Your browser does not support video.
  </video>

</section>

<!-- ================= BLOG CARDS ================= -->
<section class="grid md:grid-cols-3 gap-6 px-6 pb-20">

  <div class="bg-gray-800 p-5 rounded-lg">
    <h3 class="text-yellow-300 font-bold text-xl mb-2">Modern Design</h3>
    <p class="text-gray-300">We create modern homes with smart architecture.</p>
  </div>

  <div class="bg-gray-800 p-5 rounded-lg">
    <h3 class="text-yellow-300 font-bold text-xl mb-2">Smart Homes</h3>
    <p class="text-gray-300">Technology is changing how we live in houses.</p>
  </div>

  <div class="bg-gray-800 p-5 rounded-lg">
    <h3 class="text-yellow-300 font-bold text-xl mb-2">Luxury Living</h3>
    <p class="text-gray-300">Luxury homes bring comfort and style together.</p>
  </div>

</section>

<!-- ================= FOOTER ================= -->
<div id="footer"></div>

<!-- ================= SCRIPT ================= -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const btn = document.getElementById("menu-btn");
    const menu = document.getElementById("mobile-menu");

    if (btn && menu) {
      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });
    }
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
