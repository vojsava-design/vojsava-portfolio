<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeSmart | Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER (ONLY ONE) -->
<div id="header"></div>
<!-- CONTACT SECTION -->
<main class="max-w-3xl mx-auto p-6">

  <h2 class="text-3xl font-bold text-center text-yellow-400 mb-4">
    Contact Me
  </h2>

  <p class="text-center text-gray-200 mb-8">
    Send me a message or connect via social media.
  </p>

 <form action="https://formspree.io/f/mvzdjkvd" method="POST" class="space-y-4">

  <input type="text" name="name" placeholder="Your Name"
    class="w-full p-3 rounded bg-gray-800 text-white">

  <input type="email" name="email" placeholder="Your Email"
    class="w-full p-3 rounded bg-gray-800 text-white">

  <textarea name="message" placeholder="Your Message"
    class="w-full p-3 rounded bg-gray-800 text-white h-32"></textarea>

  <!-- spam protection -->
  <input type="text" name="_gotcha" style="display:none">

  <button type="submit"
    class="bg-yellow-400 text-gray-900 px-6 py-3 rounded font-bold hover:bg-yellow-300">
    Send Message
  </button>

</form>

  <div class="mt-10 text-center space-y-2">
    <p class="text-yellow-400 font-bold">Find me here:</p>

    <a class="block hover:text-yellow-300"
      href="https://www.linkedin.com/in/vojsava-gjiriti-8a9284290" target="_blank">
      LinkedIn Profile
    </a>

    <a class="block hover:text-yellow-300"
      href="https://www.instagram.com/vojsava_codes" target="_blank">
      Instagram
    </a>

    <p class="text-gray-300">
      Email: <span class="text-yellow-300">sawa.sawa7920@gmail.com</span>
    </p>
  </div>

</main>

<!-- FOOTER -->

<div id="footer"></div>


<!-- SCRIPT (FIXED) -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
</body>
</html>
