<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeSmart | Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER (ONLY ONE) -->
<header class="bg-gray-800 px-6 py-4 sticky top-0 z-50">

  <div class="flex items-center justify-between relative">

    <!-- LOGO -->
    <a href="index.html" class="flex items-center gap-3 z-10">
      <img src="image/logo.webp" class="w-12 h-12 rounded-full" alt="logo">
      <span class="text-yellow-400 font-bold text-xl">HomeSmart</span>
    </a>

    <!-- CENTER MENU -->
    <nav class="hidden md:flex absolute left-1/2 transform -translate-x-1/2 gap-10 font-semibold">

      <a href="index.html" class="hover:text-yellow-300">Home</a>
      <a href="project.html" class="hover:text-yellow-300">Project</a>
      <a href="about.html" class="hover:text-yellow-300">About</a>
      <a href="blog.html" class="hover:text-yellow-300">Blog</a>
      <a href="contact.html" class="hover:text-yellow-300">Contact</a>

    </nav>

    <!-- MOBILE BUTTON -->
    <button id="menu-btn" class="md:hidden text-3xl">☰</button>

  </div>

  <!-- MOBILE MENU -->
  <nav id="menu" class="hidden flex-col md:hidden bg-gray-800 mt-4 p-6 gap-4">
    <a href="index.html">Home</a>
    <a href="project.html">Project</a>
    <a href="about.html">About</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
  </nav>

</header>

<!-- CONTACT SECTION -->
<main class="max-w-3xl mx-auto p-6">

  <h2 class="text-3xl font-bold text-center text-yellow-400 mb-4">
    Contact Me
  </h2>

  <p class="text-center text-gray-200 mb-8">
    Send me a message or connect via social media.
  </p>

  <form class="space-y-4 bg-gray-800 p-6 rounded-xl">

    <input type="text" placeholder="Your Name"
      class="w-full p-3 rounded text-black">

    <input type="email" placeholder="Your Email"
      class="w-full p-3 rounded text-black">

    <textarea rows="5" placeholder="Your Message"
      class="w-full p-3 rounded text-black"></textarea>

    <button class="bg-yellow-400 text-black px-6 py-2 rounded hover:bg-yellow-300">
      Send Message
    </button>

  </form>

  <div class="mt-10 text-center space-y-2">
    <p class="text-yellow-400 font-bold">Find me here:</p>

    <a class="block hover:text-yellow-300"
      href="https://www.linkedin.com/in/vojsava-gjiriti-8a9284290" target="_blank">
      LinkedIn Profile
    </a>

    <a class="block hover:text-yellow-300"
      href="https://www.instagram.com/vojsava_codes" target="_blank">
      Instagram
    </a>

    <p class="text-gray-300">
      Email: <span class="text-yellow-300">sawa.sawa7920@gmail.com</span>
    </p>
  </div>

</main>

<!-- FOOTER -->
<footer class="bg-gray-800 text-white mt-10">

  <div class="text-center p-6">
    <p class="text-gray-300">© 2026 HomeSmart — All Rights Reserved</p>
  </div>

</footer>

<!-- SCRIPT (FIXED) -->
<script>
  const btn = document.getElementById("menu-btn");
  const menu = document.getElementById("menu");

  if (btn && menu) {
    btn.addEventListener("click", () => {
      menu.classList.toggle("hidden");
    });
  }
</script>

</body>
</html>
